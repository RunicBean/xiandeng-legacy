server {
  listen 80;
  server_name xiandeng.net.cn product.xiandeng.net.cn product-admin.xiandeng.net.cn;
  return 301 https://$server_name$request_uri;
}

server {
  listen 443;
  server_name xiandeng.net.cn;  # localhost修改为您证书绑定的域名。
  client_max_body_size 10m;
  ssl on;  # 设置为on启用SSL功能。
  ssl_certificate /data/gateway/xiandeng.net.cn.pem;
  ssl_certificate_key /data/gateway/xiandeng.net.cn.key;
  ssl_session_timeout 5m;
  ssl_protocols TLSv1 TLSv1.1 TLSv1.2;  # 使用该协议进行配置。
  ssl_ciphers ALL:!ADH:!EXPORT56:RC4+RSA:+HIGH:+MEDIUM:+LOW:+SSLv2:+EXP;  # 使用此加密套件。
  ssl_prefer_server_ciphers on;

  location / {
    # 前端项目根路径
    root /app/dist;
    # 入口文件
    index index.html index.htm;
    # 解决前端路由刷新失效问题 找不到就去index.html
    try_files $uri $uri/ /index.html;
  }

  location /ws/ {
    access_log off;
    proxy_pass http://xiandeng-server:8080/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /server/ {
    proxy_pass http://xiandeng-server:8080/;
    proxy_http_version 1.1;
    proxy_set_header    Host               $host;
    proxy_set_header    Remote_Addr        $remote_addr;
    proxy_set_header    X-Real-IP          $remote_addr;
    proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto  $scheme;
    proxy_set_header    X-Nginx-Proxy      true;

  #   if ($request_method = 'OPTIONS') {
  #     add_header 'Access-Control-Allow-Origin' '*';
  #     add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
  #     #
  #     # Custom headers and headers various browsers *should* be OK with but aren't
  #     #
  #     add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
  #     #
  #     # Tell client that this pre-flight info is valid for 20 days
  #     #
  #     add_header 'Access-Control-Max-Age' 1728000;
  #     add_header 'Content-Type' 'text/plain; charset=utf-8';
  #     add_header 'Content-Length' 0;
  #     return 204;
  #   }
  #   if ($request_method = 'POST') {
  #     add_header 'Access-Control-Allow-Origin' '*' always;
  #     add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
  #     add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
  #     add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
  #   }
  #   if ($request_method = 'GET') {
  #     add_header 'Access-Control-Allow-Origin' '*' always;
  #     add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
  #     add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
  #     add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
  #   }
  }

  # location /query {
  #     proxy_pass http://xiandeng-server:8080/query;
  #     port_in_redirect off;
  #     proxy_set_header    Host               $host:$server_port;
  #     proxy_set_header    Remote_Addr        $remote_addr;
  #     proxy_set_header    X-Real-IP          $remote_addr;
  #     proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
  #     proxy_set_header    X-Forwarded-Proto  $scheme;
  #     proxy_set_header    X-Nginx-Proxy      true;
  #   }

  # location /graphql {
  #     proxy_pass http://xiandeng-server:8080/query;
  #     port_in_redirect off;
  #     proxy_set_header    Host               $host:$server_port;
  #     proxy_set_header    Remote_Addr        $remote_addr;
  #     proxy_set_header    X-Real-IP          $remote_addr;
  #     proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
  #     proxy_set_header    X-Forwarded-Proto  $scheme;
  #     proxy_set_header    X-Nginx-Proxy      true;
  #   }

  location /health {
        access_log off;
        add_header 'Content-Type' 'application/json';
        return 200 '{"status":"Healthy"}';
    }

}

