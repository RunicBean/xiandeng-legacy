definitions:
  code.Code:
    properties:
      message:
        type: string
      number:
        type: integer
    type: object
  controller.BodyBatchTagUsers:
    properties:
      openid_list:
        items:
          type: string
        type: array
      tagid:
        type: integer
    type: object
  controller.BodyClosePayment:
    properties:
      order_id:
        type: integer
    type: object
  controller.BodyCreateCoupon:
    properties:
      discountamount:
        type: number
      effectduedate:
        type: string
      effectstartdate:
        type: string
      maxcount:
        type: integer
      productid:
        type: string
      studentid:
        type: string
    type: object
  controller.BodyCreatePayment:
    properties:
      order_number:
        type: integer
    type: object
  controller.BodyCreateTag:
    properties:
      tag:
        properties:
          name:
            type: string
        type: object
    type: object
  controller.BodyLogMessage:
    properties:
      message:
        type: string
    type: object
  controller.BodyLogin:
    properties:
      org_name:
        type: string
      password:
        example: 密码
        type: string
      phone:
        example: "13011111111"
        type: string
    type: object
  controller.BodyProductCreate:
    properties:
      description:
        type: string
      final_price:
        type: string
      hq_agent_price:
        type: string
      lv1_agent_price:
        type: string
      lv2_agent_price:
        type: string
      product_name:
        type: string
      publish_status:
        type: boolean
    type: object
  controller.BodySearchOrders:
    properties:
      agent_name:
        type: string
      payment_method:
        type: string
      price_range_end:
        type: number
      price_range_start:
        type: number
      product_name:
        type: string
      status_list:
        items:
          type: string
        type: array
      student_name:
        type: string
      updateat_end:
        type: string
      updateat_start:
        type: string
    type: object
  controller.BodySign:
    properties:
      prepay_id:
        type: string
      timestamp:
        type: string
    type: object
  controller.CreateSKUPageUrlBody:
    properties:
      next:
        type: string
    type: object
  controller.InsertAdjustmentRequest:
    properties:
      account_id:
        type: string
      amount:
        type: number
      balance_type:
        $ref: '#/definitions/models.Accountbalancetype'
      notes:
        type: string
    required:
    - account_id
    - amount
    - balance_type
    - notes
    type: object
  controller.QueryGetPaymentByOrderId:
    properties:
      order_id:
        type: integer
    type: object
  controller.ResponseCreatePayment:
    properties:
      intent:
        $ref: '#/definitions/payment.Intent'
      sign:
        $ref: '#/definitions/wechatpay.SignResult'
    type: object
  controller.ResponseJsonResult:
    properties:
      data: {}
      errorCode:
        type: integer
      message:
        type: string
      success:
        type: boolean
    type: object
  models.AccountType:
    enum:
    - STUDENT
    - HQ_AGENT
    - LV1_AGENT
    - LV2_AGENT
    - HEAD_QUARTER
    type: string
    x-enum-varnames:
    - AccountTypeStudent
    - AccountTypeHqAgent
    - AccountTypeLv1Agent
    - AccountTypeLv2Agent
    - AccountTypeHeadQuarter
  models.Accountbalancetype:
    enum:
    - balance
    - balanceleft
    - balanceright
    - balancetriplelock
    - balancetriple
    - pendingreturn
    type: string
    x-enum-varnames:
    - AccountbalancetypeBalance
    - AccountbalancetypeBalanceleft
    - AccountbalancetypeBalanceright
    - AccountbalancetypeBalancetriplelock
    - AccountbalancetypeBalancetriple
    - AccountbalancetypePendingreturn
  models.InvitationCode:
    properties:
      accountId:
        type: string
      code:
        type: string
      createType:
        $ref: '#/definitions/models.AccountType'
      expiresAt:
        type: string
      userId:
        type: string
    type: object
  payment.Intent:
    properties:
      method:
        $ref: '#/definitions/payment.PaymentMethod'
      order_id:
        type: integer
      prepay_id:
        type: string
    type: object
  payment.PaymentMethod:
    enum:
    - 0
    - 1
    type: integer
    x-enum-varnames:
    - WechatPay
    - AliPay
  request_model.BodyUpdateStudentProfile:
    properties:
      degreeyears:
        type: integer
      entrydate:
        type: string
      firstname:
        type: string
