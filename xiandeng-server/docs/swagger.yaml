  request_model.GaokaoData:
    properties:
      biology:
        type: number
      chemistry:
        type: number
      chinese:
        type: number
      foreignLanguage:
        type: number
      geography:
        type: number
      history:
        type: number
      mathematics:
        type: number
      physics:
        type: number
      politics:
        type: number
      totalScore:
        type: number
    type: object
  request_model.MbtiData:
    properties:
      mbtiDecision:
        type: string
      mbtiEnergy:
        type: string
      mbtiMind:
        type: string
      mbtiReaction:
        type: string
    type: object
  response_model.User:
