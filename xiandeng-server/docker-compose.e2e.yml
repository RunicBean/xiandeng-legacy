services:
  postgres:
    image: postgres:16
    container_name: xiandeng-e2e-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xiandeng_e2e
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d xiandeng_e2e"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - xiandeng_e2e_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:6
    container_name: xiandeng-e2e-redis
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  xiandeng_e2e_pgdata:
