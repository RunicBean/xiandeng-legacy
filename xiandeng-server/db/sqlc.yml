version: "2"
sql:
  - engine: "postgresql"
    queries: "query.sql"
    schema: "schema.sql"
    gen:
      go:
        package: "models"
        out: "models"
        overrides:
        - db_type: "uuid"
          go_type: "github.com/google/uuid.UUID"
        - db_type: "uuid"
          go_type: "github.com/google/uuid.NullUUID"
          nullable: true
        - db_type: "pg_catalog.numeric"
          go_type: 
            import: "github.com/shopspring/decimal"
            type: "Decimal"
        - db_type: "pg_catalog.numeric"
          go_type: 
            import: "github.com/shopspring/decimal"
            type: "NullDecimal"
          nullable: true
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true